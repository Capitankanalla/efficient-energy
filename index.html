<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessor Energètic - Alex</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/head.css">
    <link rel="stylesheet" href="./css/footer.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./css/seccions.css">


</head>

<body>

    <!-- HERO -->
    <header class="hero">
        <!-- SELECTOR D'IDIOMA PROVISIONAL -->
        <div id="lang-switcher">
            <button class="lang-btn" data-lang="ca">CAT</button>
            <button class="lang-btn" data-lang="es">ES</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="hero-content">
            <h1>Optimitzo el consum energètic de la teva empresa</h1>
            <p>Assessorament independent per reduir costos i millorar l’eficiència amb dades i tecnologia.</p>
            <a href="#contacte" class="cta">Sol·licita una auditoria inicial</a>
        </div>
    </header>

    <!-- SELECTOR DE SUBMINISTRAMENT -->
    <section id="selector" class="section selector-suministre visible">
        <h2>Quin tipus de subministrament vols analitzar?</h2>

        <div class="opcions">
            <div class="opcio llar">
                <img src="data/llar.svg" alt="Llar">
                <span>Llar</span>
            </div>

            <div class="opcio negoci">
                <img src="data/negoci.svg" alt="Negoci">
                <span>Negoci</span>
            </div>

            <div class="opcio industria">
                <img src="data/industria.svg" alt="Indústria">
                <span>Indústria</span>
            </div>
        </div>
    </section>

    <!-- SELECTOR DE SUBMINISTRAMENT -->
    <section id="selector" class="section selector-suministre visible">
        ...
    </section>

    <!-- Seccións on expliquem que fem, com treballem i per que ens han de contractar -->

    <!-- Secció consultor. -->
    <section id="why-consultant" class="section">
        <div class="wc-container">
            <div class="wc-text">
                <h2 id="wc-title"></h2>
                <h3 id="wc-subtitle"></h3>
                <p id="wc-short"></p>
                <button id="wc-button" class="wc-button">Llegir més</button>
            </div>

            <div class="wc-image">
                <img id="wc-img" alt="Consultor energètic">
            </div>
        </div>
    </section>

    <!-- Secció com treballem. -->
    <section id="how-we-work" class="section">
        <h2 id="hww-title"></h2>

        <ul id="hww-list" class="hww-list">
            <!-- El JS injectarà els <li> -->
        </ul>
    </section>
    <!-- Secció testimonis. -->

    <section id="clients" class="section">
        <h2 id="clients-title"></h2>
        <p id="clients-intro"></p>

        <div id="clients-carousel" class="clients-carousel">
            <!-- El JS injectarà les frases -->
        </div>
    </section>

    <footer>
        <link rel="stylesheet" href="./css/footer.css">
    </footer>


    <!-- CONTACTE -->
    <!-- <section id="contacte" class="section">
        <h2>Contacte</h2>
        <p>Vols reduir costos i millorar l’eficiència energètica? Parlem-ne.</p>

        <form class="contact-form">
            <input type="text" placeholder="Nom" required>
            <input type="email" placeholder="Correu electrònic" required>
            <textarea placeholder="Explica’m breument què necessites" required></textarea>
            <button type="submit">Enviar</button>
        </form>
    </section> -->

    <footer>
        <link rel="stylesheet" href="./css/footer.css">
    </footer>
    <!-- MODAL (carregat dinàmicament) -->
    <div id="modal-container"></div>

    <script>
        fetch('./html/modal.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('modal-container').innerHTML = html;
            });
    </script>

    <script src="./js/scripts.js"></script>
    <!-- FOOTER DINÀMIC -->
    <script type="module" src="./js/footer.js"></script>

    <!-- Modal per carregar el text llarg del per que contractar-nos. -->

    <div id="info-modal" class="modal">
        <div class="modal-content">
            <span id="info-modal-close" class="modal-close">&times;</span>
            <img id="info-modal-image" alt="" class="modal-img">
            <div id="info-modal-body" class="modal-body"></div>
        </div>
    </div>
    <script src="./js/seccions.js"></script>


</body>

</html>
